<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四捨五入小幫手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      background: linear-gradient(135deg, #f8f1eb 0%, #f0e6d9 100%);
    }
    .card {
      background: #fffaf0;
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.1);
    }
    input, select {
      border-radius: 9999px;
      transition: all 0.3s ease;
    }
    input:focus, select:focus {
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
      border-color: #f59e0b;
    }
    .mode-btn {
      border-radius: 9999px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .result {
      font-size: 2.8rem;
      line-height: 1;
    }
    .soft-orange { color: #f59e0b; }

    /* 手機優化 */
    @media (max-width: 640px) {
      .card {
        border-radius: 24px;
        padding: 24px 20px;
      }
      .result {
        font-size: 2.5rem;
      }
      input, select {
        font-size: 1.5rem;
        padding-top: 1.25rem;
        padding-bottom: 1.25rem;
      }
    }
  </style>
</head>
<body class="min-h-screen py-8 md:py-12">

  <div class="max-w-xl mx-auto px-4 md:px-6">
    <div class="card p-8 md:p-10">

      <!-- 標題 -->
      <div class="text-center mb-8 md:mb-10">
        <h1 class="text-3xl md:text-4xl font-medium text-gray-800">四捨五入小幫手</h1>
        <p class="text-gray-500 mt-2 text-base md:text-lg">國小四捨五入練習工具</p>
      </div>

      <div class="space-y-8">
        <!-- 輸入數字 -->
        <div>
          <label class="block text-gray-600 text-lg mb-3 font-medium">輸入數字</label>
          <input id="number" type="text" 
                 class="w-full text-3xl md:text-4xl py-6 md:py-7 px-6 md:px-8 border border-gray-200 focus:outline-none text-center"
                 placeholder="例如：364511.6789" value="364511.6789">
        </div>

        <!-- 計算方式 -->
        <div>
          <label class="block text-gray-600 text-lg mb-3 font-medium">計算方式</label>
          <div class="grid grid-cols-3 gap-3 md:gap-4">
            <button onclick="setMode(0)" id="mode0" 
              class="mode-btn active py-5 md:py-6 text-base md:text-lg font-medium bg-orange-500 text-white shadow-inner">
              四捨五入
            </button>
            <button onclick="setMode(1)" id="mode1" 
              class="mode-btn py-5 md:py-6 text-base md:text-lg font-medium bg-white border border-gray-200 hover:border-orange-200">
              無條件捨去
            </button>
            <button onclick="setMode(2)" id="mode2" 
              class="mode-btn py-5 md:py-6 text-base md:text-lg font-medium bg-white border border-gray-200 hover:border-orange-200">
              無條件進位
            </button>
          </div>
        </div>

        <!-- 取位選擇 -->
        <div>
          <label class="block text-gray-600 text-lg mb-3 font-medium">取到哪一位</label>
          <select id="place" 
            class="w-full text-xl md:text-2xl py-6 md:py-7 px-6 md:px-8 border border-gray-200 focus:outline-none bg-white">
            <!-- 整數位 -->
            <option value="0">個位（整數）</option>
            <option value="-1">十位</option>
            <option value="-2">百位</option>
            <option value="-3">千位</option>
            <option value="-4">萬位</option>
            <option value="-5">十萬位</option>
            <option value="-6">百萬位</option>
            <option value="-7">千萬位</option>
            <option value="-8">億位</option>
            
            <!-- 小數位 -->
            <option value="1">十分位（小數第1位）</option>
            <option value="2">百分位（小數第2位）</option>
            <option value="3">千分位（小數第3位）</option>
            <option value="4">萬分位（小數第4位）</option>
            <option value="5">十萬分位（小數第5位）</option>
            <option value="6">百萬分位（小數第6位）</option>
            <option value="7">千萬分位（小數第7位）</option>
            <option value="8">億分位（小數第8位）</option>
          </select>
        </div>

        <!-- 計算按鈕 -->
        <button onclick="calculate()" 
          class="w-full py-7 md:py-8 text-2xl md:text-3xl font-medium bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-3xl shadow-lg hover:brightness-105 transition-all active:scale-95">
          立即計算
        </button>

        <!-- 結果 -->
        <div id="resultArea" class="hidden bg-white rounded-3xl p-8 md:p-10 text-center border border-orange-100">
          <p class="text-gray-500 text-lg">計算結果</p>
          <div id="result" class="result font-medium soft-orange mt-4"></div>
          
          <div class="mt-8 pt-8 border-t border-dashed border-gray-200 text-left text-gray-600">
            <div id="explain" class="space-y-3 text-base md:text-lg"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="text-center text-gray-400 text-sm mt-8">適合國小生與爸爸媽媽一起使用</p>
  </div>

  <script>
    let currentMode = 0;

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach((btn, i) => {
        if (i === mode) {
          btn.classList.add('active', 'bg-orange-500', 'text-white', 'shadow-inner');
          btn.classList.remove('bg-white', 'border-gray-200');
        } else {
          btn.classList.remove('active', 'bg-orange-500', 'text-white', 'shadow-inner');
          btn.classList.add('bg-white', 'border-gray-200');
        }
      });
    }

    function calculate() {
      const input = document.getElementById('number').value.trim();
      const place = parseInt(document.getElementById('place').value);
      const num = parseFloat(input);

      if (isNaN(num)) {
        alert("請輸入正確的數字喔～");
        return;
      }

      let result;
      let modeText = "";

      const factor = Math.pow(10, place);

      if (currentMode === 0) {
        result = Math.round(num * factor) / factor;
        modeText = "四捨五入";
      } else if (currentMode === 1) {
        result = Math.floor(num * factor) / factor;
        modeText = "無條件捨去";
      } else if (currentMode === 2) {
        result = Math.ceil(num * factor) / factor;
        modeText = "無條件進位";
      }

      document.getElementById('result').textContent = result;
      
      document.getElementById('explain').innerHTML = `
        <p><strong>原始數字：</strong> ${num}</p>
        <p><strong>計算方式：</strong> ${modeText}</p>
        <p><strong>取位：</strong> ${document.getElementById('place').selectedOptions[0].text}</p>
      `;
      
      document.getElementById('resultArea').classList.remove('hidden');
    }

    window.onload = () => setMode(0);
  </script>
</body>
</html>
